apiVersion: apps/v1
kind: Deployment
metadata:
  name: streamlit
  labels: { app: streamlit }
spec:
  replicas: 1
  selector: { matchLabels: { app: streamlit } }
  template:
    metadata: { labels: { app: streamlit } }
    spec:
      containers:
      - name: streamlit
        image: stock-streamlit:latest
        ports: [{ containerPort: 8501 }]
        envFrom:
        - secretRef: { name: stock-secrets }
        resources:
          requests: { cpu: "250m", memory: "256Mi" }
          limits:   { cpu: "1",    memory: "1Gi" }
        livenessProbe:
          httpGet: { path: /, port: 8501 }
          initialDelaySeconds: 15
          periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata: { name: streamlit }
spec:
  selector: { app: streamlit }
  type: LoadBalancer
  ports: [{ port: 80, targetPort: 8501 }]
