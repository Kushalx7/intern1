apiVersion: apps/v1
kind: Deployment
metadata:
  name: fastapi
  labels: { app: fastapi }
spec:
  replicas: 2
  selector: { matchLabels: { app: fastapi } }
  template:
    metadata: { labels: { app: fastapi } }
    spec:
      containers:
      - name: fastapi
        image: stock-fastapi:latest
        ports: [{ containerPort: 8000 }]
        envFrom:
        - secretRef: { name: stock-secrets }
        resources:
          requests: { cpu: "250m", memory: "256Mi" }
          limits:   { cpu: "500m", memory: "512Mi" }
        livenessProbe:
          httpGet: { path: /health, port: 8000 }
          initialDelaySeconds: 10
          periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata: { name: fastapi }
spec:
  selector: { app: fastapi }
  type: LoadBalancer
  ports: [{ port: 80, targetPort: 8000 }]
